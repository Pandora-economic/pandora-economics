<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page introuvable — PANDORA Economics</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" sizes="32x32" href="https://pandora-economic.github.io/Pandora-economic/assets/favicon.png" />
<style>
  :root{--primary:#211C6B;--violet:#2C10D6;--iris:#8B6FE0;--ink:#1B1B2A;--muted:#6A6A80;--line:#D7D9EC;--paper:#FBFBFE;}
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);
       display:flex;align-items:center;justify-content:center;padding:32px;}
  .card{max-width:560px;text-align:center;}
  .logo{width:64px;height:auto;margin:0 auto 26px;display:block;}
  .code{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:clamp(64px,16vw,120px);line-height:1;color:var(--violet);margin:0;letter-spacing:-.02em;}
  h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:clamp(22px,3.4vw,30px);margin:14px 0 0;}
  p{color:var(--muted);font-size:16px;line-height:1.6;margin:14px auto 0;max-width:46ch;}
  .sub{font-size:13.5px;margin-top:8px;}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px;}
  a.btn{text-decoration:none;font-size:14.5px;padding:12px 22px;border-radius:5px;transition:.16s;}
  a.primary{background:var(--primary);color:#fff;} a.primary:hover{background:var(--violet);}
  a.ghost{border:1px solid var(--line);color:var(--ink);} a.ghost:hover{border-color:var(--violet);color:var(--violet);}
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="https://pandora-economic.github.io/Pandora-economic/logo-pandora.svg" alt="PANDORA Economics" onerror="this.style.display='none'" />
    <p class="code">404</p>
    <h1>Page introuvable</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée.
       <span class="sub">This page could not be found. · 未找到页面。</span></p>
    <div class="actions">
      <a class="btn primary" href="https://pandora-economic.github.io/Pandora-economic/index.html">Accueil</a>
      <a class="btn ghost" href="https://pandora-economic.github.io/Pandora-economic/publications.html">Publications</a>
    </div>
  </main>
</body>
</html>
